{% extends 'base.html' %}

{% block title %}Hobbysite | Online Wiki App{% endblock %}

{% block content %}
    <h1>Welcome to the Wiki App</h1>

    
        <h2>Latest Articles</h2>
        <ul>
            {% for article in articles %}
                <li><a href="{% url 'article_detail' article.pk %}">{{ article.title }} </a></li>
                {{ article.created_on }} <br><br>
            {% endfor %}
        </ul>
    
    <label for="new_article"> <b>Add Article</b> </label>
    <br>
    <textarea id="new_article" name="new_article" rows="15" cols="100" placeholder="Enter article here"></textarea>
    <br>
    <button>Submit</button>

{% endblock %}
